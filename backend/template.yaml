AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NETT Work Around — backend for Tower5.
  Magic-link activity-report forms, role-configurable dropdowns, twice-daily
  email/SMS dispatch, Aurora (PostgreSQL) storage, and CSV export.

# ──────────────────────────────────────────────────────────────────────────
# Parameters you set at deploy time (sam deploy --guided will prompt for them)
# ──────────────────────────────────────────────────────────────────────────
Parameters:
  FromEmail:
    Type: String
    Description: A verified SES "From" address (e.g. nett@tower5.com). Must be verified in SES first.
  AppBaseUrl:
    Type: String
    Description: >
      Where nett-form.html is hosted, used to build magic links. Leave EMPTY to use
      the CloudFront site created by this stack. Set it only to override with a custom domain.
    Default: ""
  TokenTtlHours:
    Type: Number
    Description: How many hours a magic link stays valid.
    Default: 36
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  SchemaVersion:
    Type: String
    Default: "1"
    Description: >
      Bump this on any deploy where you want the schema migration to re-run
      (it's idempotent, so re-running is always safe).

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        FROM_EMAIL: !Ref FromEmail
        TOKEN_TTL_HOURS: !Ref TokenTtlHours
        # Aurora (PostgreSQL). The app functions connect directly with `pg` from
        # inside the VPC (DB_HOST/DB_PORT + creds from Secrets Manager). The Data
        # API ARNs remain for MigrateFn and the one-off migration script.
        DB_CLUSTER_ARN: !GetAtt DbCluster.DBClusterArn
        DB_SECRET_ARN: !GetAtt DbCluster.MasterUserSecret.SecretArn
        DB_HOST: !GetAtt DbCluster.Endpoint.Address
        DB_PORT: !GetAtt DbCluster.Endpoint.Port
        DB_NAME: tower5

# AppBaseUrl override vs. the stack's own CloudFront domain.
Conditions:
  HasAppBaseUrl: !Not [!Equals [!Ref AppBaseUrl, ""]]

Resources:

  # ── Aurora Serverless v2 (PostgreSQL) ────────────────────────────────────
  # The relational store (db/schema.sql). The app Lambdas connect directly with
  # `pg` from inside the VPC (see the VPC networking block below); the Data API
  # (HTTPS) stays enabled for MigrateFn and the one-off migration script. The
  # cluster's security group only accepts 5432 from the Lambda security group.
  # Credentials are auto-generated and held in Secrets Manager
  # (ManageMasterUserPassword).

  DbVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  DbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DbVpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  DbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DbVpc
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Tower5 Aurora subnet group
      SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Tower5 Aurora SG - no ingress (access is via the Data API)
      VpcId: !Ref DbVpc

  DbCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      EngineVersion: "16.6"            # see README if this version isn't available in your region
      DatabaseName: tower5
      MasterUsername: tower5_admin
      ManageMasterUserPassword: true   # creates + stores the password in Secrets Manager
      EnableHttpEndpoint: true         # turns on the RDS Data API
      StorageEncrypted: true
      DeletionProtection: false        # set true for production
      DBSubnetGroupName: !Ref DbSubnetGroup
      VpcSecurityGroupIds: [!Ref DbSecurityGroup]
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5               # stays warm (no resume latency); set 0 to allow scale-to-zero
        MaxCapacity: 2

  DbInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DbCluster
      DBInstanceClass: db.serverless   # required class for Serverless v2
      Engine: aurora-postgresql

  # ── VPC networking for in-VPC Lambdas (direct Postgres access) ───────────
  # The app functions (Employee/Admin/Scheduler/Processing) run inside the VPC
  # so they can reach Aurora over a normal Postgres connection. To still reach
  # AWS service APIs (Secrets Manager, S3, KMS, Cognito, Transcribe, Lambda
  # invoke) they egress through a NAT gateway. DbSubnetA/B double as the private
  # Lambda subnets. (MigrateFn stays on the Data API and NotificationFn only
  # calls SES/SNS, so neither is placed in the VPC.)
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Tower5 Lambda SG - allow all outbound (no inbound)
      VpcId: !Ref DbVpc

  DbIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DbSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DbVpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DbVpc
      CidrBlock: 10.42.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DbVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DbVpc

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref DbSubnetA

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref DbSubnetB

  # ── Schema migration: applies db/schema.sql on deploy ────────────────────
  MigrateFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: migrate/handler.handler
      CodeUri: src/
      Timeout: 300
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn

  # Custom resource that invokes MigrateFn during the stack create/update.
  # Re-runs whenever SchemaVersion changes (the migration is idempotent).
  SchemaMigration:
    Type: Custom::SchemaMigration
    DependsOn: DbInstance
    Properties:
      ServiceToken: !GetAtt MigrateFn.Arn
      SchemaVersion: !Ref SchemaVersion

  # ── Cognito: admin identity (username/password → JWT) ────────────────────
  # Admins are provisioned (no self-signup). Each user carries custom claims:
  #   custom:tenant_id — the tenant they administer (pinned into every request)
  #   custom:role      — 'tenant_admin' (default) or 'superadmin' (cross-tenant)
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-admins"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: "OFF"            # set OPTIONAL/ON to require TOTP/SMS MFA
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true   # provisioned admins only — no public signup
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - { Name: tenant_id, AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MaxLength: "64" } }
        - { Name: role,      AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MaxLength: "32" } }

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "${AWS::StackName}-admin-client"
      GenerateSecret: false              # public client (SPA) — no client secret
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits: { AccessToken: minutes, IdToken: minutes }

  # ── HTTP API ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,x-tenant-id'"
        AllowOrigin: "'*'"
      Auth:
        # No DefaultAuthorizer → employee routes (/form, /submit, /upload-url)
        # stay public (token-auth'd in code). Admin routes opt into CognitoAuth.
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt UserPool.Arn

  # ── Employee / Survey service: magic-link token auth, backed by Aurora ────
  EmployeeFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: employee/handler.handler
      CodeUri: src/
      VpcConfig:
        SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Environment:
        Variables:
          UPLOADS_BUCKET: !Ref UploadsBucket
          UPLOADS_KMS_KEY_ID: !GetAtt UploadsKey.Arn
          PROCESSING_FN: !Ref ProcessingFn
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
            - Effect: Allow
              Action: [s3:PutObject, s3:GetObject, s3:DeleteObject]
              Resource: !Sub "${UploadsBucket.Arn}/*"
            - Effect: Allow
              Action: [kms:GenerateDataKey, kms:Decrypt]
              Resource: !GetAtt UploadsKey.Arn
            - Effect: Allow
              Action: [transcribe:StartTranscriptionJob, transcribe:GetTranscriptionJob, transcribe:DeleteTranscriptionJob]
              Resource: "*"
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt ProcessingFn.Arn
      Events:
        GetForm:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /form, Method: get }
        Submit:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /submit, Method: post }
        UploadUrl:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /upload-url, Method: post }
        Transcribe:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /transcribe, Method: any }

  # ── Admin service: API-key protected. Proxy route → in-code resource router ─
  AdminFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: admin/handler.handler
      VpcConfig:
        SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Environment:
        Variables:
          APP_BASE_URL: !If [HasAppBaseUrl, !Ref AppBaseUrl, !Sub "https://${SiteDistribution.DomainName}"]
          NOTIFICATION_FN: !Ref NotificationFn
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt NotificationFn.Arn
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminDeleteUser
              Resource: !GetAtt UserPool.Arn
      CodeUri: src/
      Events:
        AdminProxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: "/admin/{proxy+}", Method: any, Auth: { Authorizer: CognitoAuth } }

  # ── Scheduler service: twice a day (times are UTC; see README re: DST) ─────
  SchedulerFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: scheduler/handler.handler
      CodeUri: src/
      VpcConfig:
        SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Environment:
        Variables:
          APP_BASE_URL: !If [HasAppBaseUrl, !Ref AppBaseUrl, !Sub "https://${SiteDistribution.DomainName}"]
          NOTIFICATION_FN: !Ref NotificationFn
          SCHEDULE_TZ: America/Los_Angeles        # timezone survey send_time/resend_time are read in
          SCHEDULE_INTERVAL_MIN: "15"             # must match the tick rate below
      Policies:
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt NotificationFn.Arn
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
      Events:
        # Ticks every 15 min; the handler sends each survey on its own
        # send_days/send_time (and resend_time for non-responders).
        Tick:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)

  # ── Processing service: Transcribe (recorded audio) → text ───────────────
  # Invoked async by the Employee service after /submit; Transcribe completions
  # arrive via an EventBridge rule. Writes results to digital_assets.extracted_text.
  ProcessingFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: processing/handler.handler
      CodeUri: src/
      Timeout: 60
      VpcConfig:
        SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Environment:
        Variables:
          UPLOADS_BUCKET: !Ref UploadsBucket
          UPLOADS_KMS_KEY_ID: !GetAtt UploadsKey.Arn
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
            - Effect: Allow
              Action: [s3:GetObject, s3:PutObject]
              Resource: !Sub "${UploadsBucket.Arn}/*"
            - Effect: Allow
              Action: [kms:Decrypt, kms:GenerateDataKey]
              Resource: !GetAtt UploadsKey.Arn
            - Effect: Allow
              Action: [transcribe:StartTranscriptionJob, transcribe:GetTranscriptionJob]
              Resource: "*"
      Events:
        TranscribeDone:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source: [aws.transcribe]
              detail-type: ["Transcribe Job State Change"]
              detail:
                TranscriptionJobStatus: [COMPLETED, FAILED]

  # ── Notification service: the SES/SNS sending boundary ───────────────────
  # Invoked asynchronously by Admin + Scheduler with a resolved message batch.
  NotificationFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: notification/handler.handler
      CodeUri: src/
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail]
              Resource: '*'
            - Effect: Allow
              Action: [sns:Publish]
              Resource: '*'

  # ── Uploads: private, KMS-encrypted bucket for survey audio/file assets ───
  # Employees upload directly to S3 via short-lived presigned PUT URLs minted by
  # the Employee service; the bytes never pass through Lambda/API Gateway.
  UploadsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Tower5 uploads-bucket encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: kms:*
            Resource: '*'

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt UploadsKey.Arn
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT]
            AllowedOrigins: ["*"]      # tighten to your site origin for production
            AllowedHeaders: ["*"]
            MaxAge: 3000

  # ── Static hosting: private S3 bucket served only through CloudFront ───────
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]

  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${AWS::Region}-site-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: nett-form.html
        PriceClass: PriceClass_100   # US/CA/EU edges — cheapest, fine for an LA team
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          # Managed "CachingDisabled" — so HTML edits go live without invalidation.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}"

Outputs:
  ApiBaseUrl:
    Description: Base URL for the API. Put this in nett-form.html (API_BASE) and the admin panel.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  SiteUrl:
    Description: CloudFront URL where the form is hosted. This is the magic-link base.
    Value: !Sub "https://${SiteDistribution.DomainName}"
  SiteBucketName:
    Description: Upload the HTML files here (aws s3 cp nett-form.html s3://<this>/).
    Value: !Ref SiteBucket
  UserPoolId:
    Description: Cognito User Pool id (for `aws cognito-idp admin-create-user`, etc.).
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito app client id (for `initiate-auth` to get a JWT).
    Value: !Ref UserPoolClient
  DbClusterArn:
    Description: Aurora cluster ARN. Pass as --resource-arn to `aws rds-data execute-statement`.
    Value: !GetAtt DbCluster.DBClusterArn
  DbSecretArn:
    Description: Secrets Manager ARN holding the DB credentials. Pass as --secret-arn to the Data API.
    Value: !GetAtt DbCluster.MasterUserSecret.SecretArn
  DbName:
    Description: Database name inside the cluster.
    Value: tower5
