AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NETT Work Around — backend for Tower5.
  Magic-link activity-report forms, role-configurable dropdowns, twice-daily
  email/SMS dispatch, DynamoDB storage, and CSV export.

# ──────────────────────────────────────────────────────────────────────────
# Parameters you set at deploy time (sam deploy --guided will prompt for them)
# ──────────────────────────────────────────────────────────────────────────
Parameters:
  FromEmail:
    Type: String
    Description: A verified SES "From" address (e.g. nett@tower5.com). Must be verified in SES first.
  AppBaseUrl:
    Type: String
    Description: >
      Where nett-form.html is hosted, used to build magic links. Leave EMPTY to use
      the CloudFront site created by this stack. Set it only to override with a custom domain.
    Default: ""
  TokenTtlHours:
    Type: Number
    Description: How many hours a magic link stays valid.
    Default: 36
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  SchemaVersion:
    Type: String
    Default: "1"
    Description: >
      Bump this on any deploy where you want the schema migration to re-run
      (it's idempotent, so re-running is always safe).

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        MEMBERS_TABLE: !Ref MembersTable
        CONFIG_TABLE: !Ref ConfigTable
        TOKENS_TABLE: !Ref TokensTable
        RESPONSES_TABLE: !Ref ResponsesTable
        FROM_EMAIL: !Ref FromEmail
        TOKEN_TTL_HOURS: !Ref TokenTtlHours
        # Aurora (PostgreSQL) — accessed via the RDS Data API.
        DB_CLUSTER_ARN: !GetAtt DbCluster.DBClusterArn
        DB_SECRET_ARN: !GetAtt DbCluster.MasterUserSecret.SecretArn
        DB_NAME: tower5

# AppBaseUrl override vs. the stack's own CloudFront domain.
Conditions:
  HasAppBaseUrl: !Not [!Equals [!Ref AppBaseUrl, ""]]

Resources:

  # ── DynamoDB tables ──────────────────────────────────────────────────────
  MembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: memberId, AttributeType: S }
      KeySchema:
        - { AttributeName: memberId, KeyType: HASH }

  # Single-item table holding global dropdown options + per-role overrides.
  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: configKey, AttributeType: S }
      KeySchema:
        - { AttributeName: configKey, KeyType: HASH }

  # Magic-link tokens. Auto-expire via DynamoDB TTL on `expiresAt`.
  TokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: token, AttributeType: S }
      KeySchema:
        - { AttributeName: token, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # One item per submitted report. PK=memberId, SK=submittedAt → clean per-person history.
  ResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: memberId, AttributeType: S }
        - { AttributeName: submittedAt, AttributeType: S }
      KeySchema:
        - { AttributeName: memberId, KeyType: HASH }
        - { AttributeName: submittedAt, KeyType: RANGE }

  # ── Aurora Serverless v2 (PostgreSQL) ────────────────────────────────────
  # The relational store (db/schema.sql). Reached over the RDS Data API (HTTPS),
  # so the Lambdas do NOT need to live in the VPC. The cluster still requires a
  # VPC + subnet group, but nothing connects to it on the network path, so the
  # security group has no ingress rules. Credentials are auto-generated and held
  # in Secrets Manager (ManageMasterUserPassword).

  DbVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  DbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DbVpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  DbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DbVpc
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Tower5 Aurora subnet group
      SubnetIds: [!Ref DbSubnetA, !Ref DbSubnetB]

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Tower5 Aurora SG - no ingress (access is via the Data API)
      VpcId: !Ref DbVpc

  DbCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      EngineVersion: "16.6"            # see README if this version isn't available in your region
      DatabaseName: tower5
      MasterUsername: tower5_admin
      ManageMasterUserPassword: true   # creates + stores the password in Secrets Manager
      EnableHttpEndpoint: true         # turns on the RDS Data API
      StorageEncrypted: true
      DeletionProtection: false        # set true for production
      DBSubnetGroupName: !Ref DbSubnetGroup
      VpcSecurityGroupIds: [!Ref DbSecurityGroup]
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5               # stays warm (no resume latency); set 0 to allow scale-to-zero
        MaxCapacity: 2

  DbInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DbCluster
      DBInstanceClass: db.serverless   # required class for Serverless v2
      Engine: aurora-postgresql

  # ── Schema migration: applies db/schema.sql on deploy ────────────────────
  MigrateFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: migrate/handler.handler
      CodeUri: src/
      Timeout: 300
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn

  # Custom resource that invokes MigrateFn during the stack create/update.
  # Re-runs whenever SchemaVersion changes (the migration is idempotent).
  SchemaMigration:
    Type: Custom::SchemaMigration
    DependsOn: DbInstance
    Properties:
      ServiceToken: !GetAtt MigrateFn.Arn
      SchemaVersion: !Ref SchemaVersion

  # ── HTTP API ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,x-api-key'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false       # public routes are token-auth'd in code
        UsagePlan:
          CreateUsagePlan: PER_API  # creates an API key + usage plan for admin routes

  # ── Public Lambda: employee-facing, authenticated by magic-link token ─────
  PublicFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: public/handler.handler
      CodeUri: src/
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref MembersTable }
        - DynamoDBReadPolicy: { TableName: !Ref ConfigTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TokensTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ResponsesTable }
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
      Events:
        GetForm:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /form, Method: get }
        Submit:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /submit, Method: post }

  # ── Admin Lambda: API-key protected (team, config, dispatch, export) ──────
  AdminFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: admin/handler.handler
      Environment:
        Variables:
          APP_BASE_URL: !If [HasAppBaseUrl, !Ref AppBaseUrl, !Sub "https://${SiteDistribution.DomainName}"]
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref MembersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConfigTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TokensTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ResponsesTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail]
              Resource: '*'
            - Effect: Allow
              Action: [sns:Publish]
              Resource: '*'
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
      CodeUri: src/
      Events:
        Members:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /admin/members, Method: any, Auth: { ApiKeyRequired: true } }
        Member:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: "/admin/members/{id}", Method: any, Auth: { ApiKeyRequired: true } }
        Config:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /admin/config, Method: any, Auth: { ApiKeyRequired: true } }
        Dispatch:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /admin/dispatch, Method: post, Auth: { ApiKeyRequired: true } }
        Export:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /admin/export, Method: get, Auth: { ApiKeyRequired: true } }

  # ── Scheduled dispatch: twice a day (times are UTC; see README re: DST) ────
  ScheduledDispatchFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: scheduled/handler.handler
      CodeUri: src/
      Environment:
        Variables:
          APP_BASE_URL: !If [HasAppBaseUrl, !Ref AppBaseUrl, !Sub "https://${SiteDistribution.DomainName}"]
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref MembersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TokensTable }
        - DynamoDBReadPolicy: { TableName: !Ref ResponsesTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail]
              Resource: '*'
            - Effect: Allow
              Action: [sns:Publish]
              Resource: '*'
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !GetAtt DbCluster.DBClusterArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !GetAtt DbCluster.MasterUserSecret.SecretArn
      Events:
        EndOfDay:        # 4:00 PM Pacific (23:00 UTC during PDT) — full team reminder
          Type: Schedule
          Properties:
            Schedule: cron(0 23 * * ? *)
            Input: '{"audience":"all","reason":"eod"}'
        MorningFollowup: # 8:30 AM Pacific (15:30 UTC during PDT) — non-responders only
          Type: Schedule
          Properties:
            Schedule: cron(30 15 * * ? *)
            Input: '{"audience":"nonresponders","reason":"morning"}'

  # ── Static hosting: private S3 bucket served only through CloudFront ───────
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]

  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-site-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: nett-form.html
        PriceClass: PriceClass_100   # US/CA/EU edges — cheapest, fine for an LA team
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          # Managed "CachingDisabled" — so HTML edits go live without invalidation.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}"

Outputs:
  ApiBaseUrl:
    Description: Base URL for the API. Put this in nett-form.html (API_BASE) and the admin panel.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  SiteUrl:
    Description: CloudFront URL where the form is hosted. This is the magic-link base.
    Value: !Sub "https://${SiteDistribution.DomainName}"
  SiteBucketName:
    Description: Upload the HTML files here (aws s3 cp nett-form.html s3://<this>/).
    Value: !Ref SiteBucket
  ApiKeyId:
    Description: Run `aws apigateway get-api-key --api-key <this id> --include-value` to get the admin key.
    Value: !Ref ApiApiKey   # auto-created by the UsagePlan above
  DbClusterArn:
    Description: Aurora cluster ARN. Pass as --resource-arn to `aws rds-data execute-statement`.
    Value: !GetAtt DbCluster.DBClusterArn
  DbSecretArn:
    Description: Secrets Manager ARN holding the DB credentials. Pass as --secret-arn to the Data API.
    Value: !GetAtt DbCluster.MasterUserSecret.SecretArn
  DbName:
    Description: Database name inside the cluster.
    Value: tower5
