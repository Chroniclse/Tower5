AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "NETT Work Around \u2014 backend for Tower5. Magic-link activity-report\
  \ forms, role-configurable dropdowns, twice-daily email/SMS dispatch, Aurora (PostgreSQL)\
  \ storage, and CSV export.\n"
Parameters:
  FromEmail:
    Type: String
    Description: A verified SES "From" address (e.g. nett@tower5.com). Must be verified
      in SES first.
  AppBaseUrl:
    Type: String
    Description: 'Where nett-form.html is hosted, used to build magic links. Leave
      EMPTY to use the CloudFront site created by this stack. Set it only to override
      with a custom domain.

      '
    Default: ''
  TokenTtlHours:
    Type: Number
    Description: How many hours a magic link stays valid.
    Default: 36
  Stage:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - prod
  SchemaVersion:
    Type: String
    Default: '1'
    Description: 'Bump this on any deploy where you want the schema migration to re-run
      (it''s idempotent, so re-running is always safe).

      '
Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
    - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        FROM_EMAIL:
          Ref: FromEmail
        TOKEN_TTL_HOURS:
          Ref: TokenTtlHours
        DB_CLUSTER_ARN:
          Fn::GetAtt:
          - DbCluster
          - DBClusterArn
        DB_SECRET_ARN:
          Fn::GetAtt:
          - DbCluster
          - MasterUserSecret.SecretArn
        DB_NAME: tower5
Conditions:
  HasAppBaseUrl:
    Fn::Not:
    - Fn::Equals:
      - Ref: AppBaseUrl
      - ''
Resources:
  DbVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
  DbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: DbVpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs: ''
  DbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: DbVpc
      CidrBlock: 10.42.2.0/24
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs: ''
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Tower5 Aurora subnet group
      SubnetIds:
      - Ref: DbSubnetA
      - Ref: DbSubnetB
  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Tower5 Aurora SG - no ingress (access is via the Data API)
      VpcId:
        Ref: DbVpc
  DbCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      EngineVersion: '16.6'
      DatabaseName: tower5
      MasterUsername: tower5_admin
      ManageMasterUserPassword: true
      EnableHttpEndpoint: true
      StorageEncrypted: true
      DeletionProtection: false
      DBSubnetGroupName:
        Ref: DbSubnetGroup
      VpcSecurityGroupIds:
      - Ref: DbSecurityGroup
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 2
  DbInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier:
        Ref: DbCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
  MigrateFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: migrate/handler.handler
      CodeUri: MigrateFn
      Timeout: 300
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - rds-data:ExecuteStatement
          - rds-data:BatchExecuteStatement
          - rds-data:BeginTransaction
          - rds-data:CommitTransaction
          - rds-data:RollbackTransaction
          Resource:
            Fn::GetAtt:
            - DbCluster
            - DBClusterArn
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Fn::GetAtt:
            - DbCluster
            - MasterUserSecret.SecretArn
    Metadata:
      SamResourceId: MigrateFn
  SchemaMigration:
    Type: Custom::SchemaMigration
    DependsOn: DbInstance
    Properties:
      ServiceToken:
        Fn::GetAtt:
        - MigrateFn
        - Arn
      SchemaVersion:
        Ref: SchemaVersion
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ${AWS::StackName}-admins
      UsernameAttributes:
      - email
      AutoVerifiedAttributes:
      - email
      MfaConfiguration: 'OFF'
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
      - Name: tenant_id
        AttributeDataType: String
        Mutable: true
        StringAttributeConstraints:
          MaxLength: '64'
      - Name: role
        AttributeDataType: String
        Mutable: true
        StringAttributeConstraints:
          MaxLength: '32'
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId:
        Ref: UserPool
      ClientName:
        Fn::Sub: ${AWS::StackName}-admin-client
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Stage
      Cors:
        AllowMethods: '''GET,POST,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization,x-tenant-id'''
        AllowOrigin: '''*'''
      Auth:
        Authorizers:
          CognitoAuth:
            UserPoolArn:
              Fn::GetAtt:
              - UserPool
              - Arn
  EmployeeFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: employee/handler.handler
      CodeUri: EmployeeFn
      Environment:
        Variables:
          UPLOADS_BUCKET:
            Ref: UploadsBucket
          UPLOADS_KMS_KEY_ID:
            Fn::GetAtt:
            - UploadsKey
            - Arn
          PROCESSING_FN:
            Ref: ProcessingFn
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - rds-data:ExecuteStatement
          - rds-data:BatchExecuteStatement
          - rds-data:BeginTransaction
          - rds-data:CommitTransaction
          - rds-data:RollbackTransaction
          Resource:
            Fn::GetAtt:
            - DbCluster
            - DBClusterArn
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Fn::GetAtt:
            - DbCluster
            - MasterUserSecret.SecretArn
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          - s3:DeleteObject
          Resource:
            Fn::Sub: ${UploadsBucket.Arn}/*
        - Effect: Allow
          Action:
          - kms:GenerateDataKey
          - kms:Decrypt
          Resource:
            Fn::GetAtt:
            - UploadsKey
            - Arn
        - Effect: Allow
          Action:
          - transcribe:StartTranscriptionJob
          - transcribe:GetTranscriptionJob
          - transcribe:DeleteTranscriptionJob
          Resource: '*'
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - ProcessingFn
            - Arn
      Events:
        GetForm:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /form
            Method: get
        Submit:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /submit
            Method: post
        UploadUrl:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /upload-url
            Method: post
        Transcribe:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /transcribe
            Method: any
    Metadata:
      SamResourceId: EmployeeFn
  AdminFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: admin/handler.handler
      Environment:
        Variables:
          APP_BASE_URL:
            Fn::If:
            - HasAppBaseUrl
            - Ref: AppBaseUrl
            - Fn::Sub: https://${SiteDistribution.DomainName}
          NOTIFICATION_FN:
            Ref: NotificationFn
          USER_POOL_ID:
            Ref: UserPool
      Policies:
      - Statement:
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - NotificationFn
            - Arn
        - Effect: Allow
          Action:
          - rds-data:ExecuteStatement
          - rds-data:BatchExecuteStatement
          - rds-data:BeginTransaction
          - rds-data:CommitTransaction
          - rds-data:RollbackTransaction
          Resource:
            Fn::GetAtt:
            - DbCluster
            - DBClusterArn
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Fn::GetAtt:
            - DbCluster
            - MasterUserSecret.SecretArn
        - Effect: Allow
          Action:
          - cognito-idp:AdminCreateUser
          - cognito-idp:AdminSetUserPassword
          - cognito-idp:AdminDeleteUser
          Resource:
            Fn::GetAtt:
            - UserPool
            - Arn
      CodeUri: AdminFn
      Events:
        AdminProxy:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /admin/{proxy+}
            Method: any
            Auth:
              Authorizer: CognitoAuth
    Metadata:
      SamResourceId: AdminFn
  SchedulerFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: scheduler/handler.handler
      CodeUri: SchedulerFn
      Environment:
        Variables:
          APP_BASE_URL:
            Fn::If:
            - HasAppBaseUrl
            - Ref: AppBaseUrl
            - Fn::Sub: https://${SiteDistribution.DomainName}
          NOTIFICATION_FN:
            Ref: NotificationFn
          SCHEDULE_TZ: America/Los_Angeles
          SCHEDULE_INTERVAL_MIN: '15'
      Policies:
      - Statement:
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - NotificationFn
            - Arn
        - Effect: Allow
          Action:
          - rds-data:ExecuteStatement
          - rds-data:BatchExecuteStatement
          - rds-data:BeginTransaction
          - rds-data:CommitTransaction
          - rds-data:RollbackTransaction
          Resource:
            Fn::GetAtt:
            - DbCluster
            - DBClusterArn
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Fn::GetAtt:
            - DbCluster
            - MasterUserSecret.SecretArn
      Events:
        Tick:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
    Metadata:
      SamResourceId: SchedulerFn
  ProcessingFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: processing/handler.handler
      CodeUri: ProcessingFn
      Timeout: 60
      Environment:
        Variables:
          UPLOADS_BUCKET:
            Ref: UploadsBucket
          UPLOADS_KMS_KEY_ID:
            Fn::GetAtt:
            - UploadsKey
            - Arn
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - rds-data:ExecuteStatement
          - rds-data:BatchExecuteStatement
          - rds-data:BeginTransaction
          - rds-data:CommitTransaction
          - rds-data:RollbackTransaction
          Resource:
            Fn::GetAtt:
            - DbCluster
            - DBClusterArn
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Fn::GetAtt:
            - DbCluster
            - MasterUserSecret.SecretArn
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:PutObject
          Resource:
            Fn::Sub: ${UploadsBucket.Arn}/*
        - Effect: Allow
          Action:
          - kms:Decrypt
          - kms:GenerateDataKey
          Resource:
            Fn::GetAtt:
            - UploadsKey
            - Arn
        - Effect: Allow
          Action:
          - transcribe:StartTranscriptionJob
          - transcribe:GetTranscriptionJob
          Resource: '*'
      Events:
        TranscribeDone:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
              - aws.transcribe
              detail-type:
              - Transcribe Job State Change
              detail:
                TranscriptionJobStatus:
                - COMPLETED
                - FAILED
    Metadata:
      SamResourceId: ProcessingFn
  NotificationFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: notification/handler.handler
      CodeUri: NotificationFn
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - ses:SendEmail
          Resource: '*'
        - Effect: Allow
          Action:
          - sns:Publish
          Resource: '*'
    Metadata:
      SamResourceId: NotificationFn
  UploadsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Tower5 uploads-bucket encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowAccountAdmin
          Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: kms:*
          Resource: '*'
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
        - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: aws:kms
            KMSMasterKeyID:
              Fn::GetAtt:
              - UploadsKey
              - Arn
      CorsConfiguration:
        CorsRules:
        - AllowedMethods:
          - PUT
          AllowedOrigins:
          - '*'
          AllowedHeaders:
          - '*'
          MaxAge: 3000
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
        - ObjectOwnership: BucketOwnerEnforced
  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: ${AWS::StackName}-${AWS::Region}-site-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: nett-form.html
        PriceClass: PriceClass_100
        Origins:
        - Id: s3origin
          DomainName:
            Fn::GetAtt:
            - SiteBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - SiteOAC
            - Id
          S3OriginConfig:
            OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
          - GET
          - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowCloudFrontRead
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${SiteBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution.Id}
Outputs:
  ApiBaseUrl:
    Description: Base URL for the API. Put this in nett-form.html (API_BASE) and the
      admin panel.
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  SiteUrl:
    Description: CloudFront URL where the form is hosted. This is the magic-link base.
    Value:
      Fn::Sub: https://${SiteDistribution.DomainName}
  SiteBucketName:
    Description: Upload the HTML files here (aws s3 cp nett-form.html s3://<this>/).
    Value:
      Ref: SiteBucket
  UserPoolId:
    Description: Cognito User Pool id (for `aws cognito-idp admin-create-user`, etc.).
    Value:
      Ref: UserPool
  UserPoolClientId:
    Description: Cognito app client id (for `initiate-auth` to get a JWT).
    Value:
      Ref: UserPoolClient
  DbClusterArn:
    Description: Aurora cluster ARN. Pass as --resource-arn to `aws rds-data execute-statement`.
    Value:
      Fn::GetAtt:
      - DbCluster
      - DBClusterArn
  DbSecretArn:
    Description: Secrets Manager ARN holding the DB credentials. Pass as --secret-arn
      to the Data API.
    Value:
      Fn::GetAtt:
      - DbCluster
      - MasterUserSecret.SecretArn
  DbName:
    Description: Database name inside the cluster.
    Value: tower5
